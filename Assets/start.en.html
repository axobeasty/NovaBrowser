<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NovaBrowser</title>

  <style>

    :root {

      color-scheme: dark;

      --bg: #0f1117;

      --surface: #171a24;

      --accent: #6c5ce7;

      --accent-soft: #a29bfe;

      --text: #f5f6fa;

      --muted: #9aa0b5;

    }



    * { box-sizing: border-box; }



    body {

      margin: 0;

      min-height: 100vh;

      font-family: "Segoe UI Variable", "Segoe UI", sans-serif;

      background:

        radial-gradient(circle at top left, rgba(108, 92, 231, 0.25), transparent 35%),

        radial-gradient(circle at bottom right, rgba(162, 155, 254, 0.15), transparent 30%),

        var(--bg);

      color: var(--text);

      display: grid;

      place-items: center;

      padding: 32px;

    }



    .card {

      width: min(720px, 100%);

      background: rgba(23, 26, 36, 0.85);

      border: 1px solid rgba(255, 255, 255, 0.08);

      border-radius: 24px;

      padding: 40px;

      backdrop-filter: blur(16px);

      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);

    }



    .logo {

      display: flex;

      align-items: center;

      gap: 16px;

      margin-bottom: 24px;

    }



    .logo-mark {

      width: 56px;

      height: 56px;

      border-radius: 16px;

      background: linear-gradient(135deg, var(--accent), var(--accent-soft));

      display: grid;

      place-items: center;

      font-size: 28px;

      font-weight: 700;

    }



    h1 {

      margin: 0;

      font-size: 32px;

      letter-spacing: -0.02em;

    }



    p {

      margin: 0 0 24px;

      color: var(--muted);

      line-height: 1.6;

    }



    .search {

      display: flex;

      gap: 12px;

      margin-bottom: 28px;

    }



    input {

      flex: 1;

      border: 1px solid rgba(255, 255, 255, 0.12);

      background: rgba(255, 255, 255, 0.04);

      color: var(--text);

      border-radius: 999px;

      padding: 14px 18px;

      font-size: 16px;

      outline: none;

    }



    input:focus {

      border-color: var(--accent-soft);

      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.25);

    }



    button {

      border: 0;

      border-radius: 999px;

      padding: 0 22px;

      background: linear-gradient(135deg, var(--accent), var(--accent-soft));

      color: white;

      font-weight: 600;

      cursor: pointer;

    }



    .shortcuts {

      display: grid;

      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));

      gap: 12px;

    }



    .shortcut {

      display: block;

      padding: 14px 16px;

      border-radius: 14px;

      background: rgba(255, 255, 255, 0.04);

      border: 1px solid rgba(255, 255, 255, 0.08);

      color: var(--text);

      text-decoration: none;

      transition: transform 0.15s ease, border-color 0.15s ease;

    }



    .shortcut:hover {

      transform: translateY(-2px);

      border-color: rgba(162, 155, 254, 0.5);

    }

  </style>

</head>

<body>

  <main class="card">

    <div class="logo">

      <div class="logo-mark">N</div>

      <div>

        <h1>NovaBrowser</h1>

        <p>Your browser on WinUI 3 and WebView2</p>

      </div>

    </div>



    <p>Enter a URL or search query to get started.</p>



    <form class="search" id="searchForm">

      <input id="query" type="text" placeholder="Search or website address" autofocus />

      <button type="submit">Search</button>

    </form>



    <div class="shortcuts">

      <a class="shortcut" href="https://github.com">GitHub</a>

      <a class="shortcut" href="https://learn.microsoft.com/windows/apps/winui/">WinUI Docs</a>

      <a class="shortcut" href="https://developer.microsoft.com/microsoft-edge/webview2/">WebView2</a>

      <a class="shortcut" href="https://www.bing.com">Bing</a>

    </div>

  </main>



  <script>

    document.getElementById("searchForm").addEventListener("submit", (event) => {

      event.preventDefault();

      const value = document.getElementById("query").value.trim();

      if (!value) return;



      let target = value;

      if (!/^https?:\/\//i.test(value) && value.includes(".") && !value.includes(" ")) {

        target = "https://" + value;

      } else if (!/^https?:\/\//i.test(value)) {

        const template = window.__novaSearchUrl || "https://www.bing.com/search?q=";
        target = template + encodeURIComponent(value);

      }



      window.location.href = target;

    });

  </script>

</body>

</html>
