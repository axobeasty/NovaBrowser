name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: x86
            rid: win-x86
          - platform: arm64
            rid: win-arm64

    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install WinUI templates
        run: dotnet new install Microsoft.WindowsAppSDK.WinUI.CSharp.Templates

      - name: Publish browser
        run: dotnet publish NovaBrowser.csproj -c Release -p:Platform=${{ matrix.platform }} -r ${{ matrix.rid }} -o "publish/${{ matrix.rid }}"

      - name: Build installer
        shell: pwsh
        run: |
          $platform = "${{ matrix.platform }}"
          if ($platform -eq "arm64") { $platform = "ARM64" }
          ./NovaBrowser.Installer/build-installer.ps1 -Platform $platform

      - name: Create release zips
        shell: pwsh
        run: |
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "NovaBrowser-${{ matrix.rid }}.zip"
          Copy-Item "dist/NovaBrowser.Setup-${{ matrix.rid }}.zip" "NovaBrowser.Setup-${{ matrix.rid }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaBrowser-${{ matrix.rid }}
          path: |
            NovaBrowser-${{ matrix.rid }}.zip
            NovaBrowser.Setup-${{ matrix.rid }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip
